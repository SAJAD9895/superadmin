name: 🚀 Deploy — Staging

on:
  push:
    branches:
      - staging          # Triggers on every push to 'staging' branch
  workflow_dispatch:     # Manual trigger from GitHub Actions UI

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel (Staging)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Install Vercel CLI ────────────────────────────────
      - name: ▲ Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 5. Pull Vercel project settings ─────────────────────
      #   Required secrets in GitHub:
      #   VERCEL_TOKEN            → Vercel → Settings → Tokens → Create
      #   VERCEL_ORG_ID           → Vercel → Settings → General → Team ID
      #   VERCEL_PROJECT_ID_STAGING → Vercel staging project → Settings → Project ID
      - name: 📥 Pull Vercel environment info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      # ── 6. Build project via Vercel ──────────────────────────
      - name: 🔨 Build project (Staging)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: staging

      # ── 7. Deploy to Vercel (preview/staging) ────────────────
      - name: � Deploy to Vercel (Staging preview)
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
