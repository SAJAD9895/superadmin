name: 🚀 Deploy — Staging

on:
  push:
    branches:
      - staging          # Trigger on every push to the 'staging' branch
  workflow_dispatch:     # Allow manual triggers from GitHub Actions UI

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy (Staging)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Build with staging env vars ───────────────────────
      #   Secrets are stored in:
      #   GitHub → Repository Settings → Secrets and variables → Actions
      #   Add:  STAGING_SUPABASE_URL
      #         STAGING_SUPABASE_ANON_KEY
      - name: 🔨 Build (Staging)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: staging

      # ── 5a. Deploy to Netlify (Staging) ──────────────────────
      #   Uncomment this block and add NETLIFY_AUTH_TOKEN + NETLIFY_STAGING_SITE_ID secrets.
      #   Install the Netlify GitHub App or use a custom deploy action.
      # - name: 🌐 Deploy to Netlify (Staging)
      #   uses: nwtgck/actions-netlify@v3.0
      #   with:
      #     publish-dir: './dist'
      #     production-deploy: false   # Keeps it as a preview / staging deploy
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     deploy-message: "Staging deploy from ${{ github.sha }}"
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

      # ── 5b. Deploy to Vercel (Staging) ───────────────────────
      #   Uncomment this block and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets.
      # - name: ▲ Deploy to Vercel (Staging)
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: ./dist

      # ── 6. Upload build artifact ─────────────────────────────
      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build-${{ github.sha }}
          path: dist/
          retention-days: 7
