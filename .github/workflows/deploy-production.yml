name: 🚀 Deploy — Production (Live)

on:
  push:
    branches:
      - main             # Triggers on every push to 'main'
    tags:
      - 'v*'             # Also triggers on version tags e.g. v1.0.0
  workflow_dispatch:     # Manual trigger from GitHub Actions UI

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel (Production)
    runs-on: ubuntu-latest

    environment:
      name: production   # Links to GitHub Environments → "production"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Install Vercel CLI ────────────────────────────────
      - name: ▲ Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 5. Pull Vercel project settings ─────────────────────
      #   Required secrets in GitHub:
      #   VERCEL_TOKEN       → Vercel → Settings → Tokens → Create
      #   VERCEL_ORG_ID      → Vercel → Settings → General → Team ID
      #   VERCEL_PROJECT_ID  → Vercel Project → Settings → General → Project ID
      - name: 📥 Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      # ── 6. Build project via Vercel ──────────────────────────
      #   Vercel injects the env vars you set in Vercel dashboard
      #   OR we can pass them directly via --build-env below
      - name: 🔨 Build project (Production)
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production

      # ── 7. Deploy to Vercel Production ───────────────────────
      - name: 🚀 Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
