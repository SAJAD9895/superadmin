name: 🚀 Deploy — Production (Live)

on:
  push:
    branches:
      - main             # Trigger on every push to the 'main' branch
    tags:
      - 'v*'             # Also trigger on any version tag (e.g. v1.0.0)
  workflow_dispatch:     # Allow manual triggers from GitHub Actions UI

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy (Production)
    runs-on: ubuntu-latest

    environment:
      name: production   # Links to GitHub Environments (Settings → Environments)

    steps:
      # ── 1. Checkout code ─────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ────────────────────────────────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Build with production env vars ────────────────────
      #   Secrets are stored in:
      #   GitHub → Repository Settings → Secrets and variables → Actions
      #   → Environment secrets (under 'production' environment)
      #   Add:  PROD_SUPABASE_URL
      #         PROD_SUPABASE_ANON_KEY
      - name: 🔨 Build (Production)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production

      # ── 5a. Deploy to Netlify (Production) ───────────────────
      #   Uncomment and add NETLIFY_AUTH_TOKEN + NETLIFY_PROD_SITE_ID secrets.
      # - name: 🌐 Deploy to Netlify (Production)
      #   uses: nwtgck/actions-netlify@v3.0
      #   with:
      #     publish-dir: './dist'
      #     production-deploy: true
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     deploy-message: "Production deploy ${{ github.ref_name }} — ${{ github.sha }}"
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}

      # ── 5b. Deploy to Vercel (Production) ────────────────────
      #   Uncomment and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets.
      # - name: ▲ Deploy to Vercel (Production)
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: '--prod'
      #     working-directory: ./dist

      # ── 6. Upload build artifact ─────────────────────────────
      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: dist/
          retention-days: 30
